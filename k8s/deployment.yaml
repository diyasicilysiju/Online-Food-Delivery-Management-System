apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-delivery-demo
  template:
    metadata:
      labels:
        app: food-delivery-demo
    spec:
      containers:
        - name: food-delivery-demo
          image: diya1sicily/food-delivery-demo:latest
          ports:
            - containerPort: 8080